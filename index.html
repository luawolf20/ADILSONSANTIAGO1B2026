<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Vanguards Wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --bg2:#0d0d0d;
    --purple:#8A2BE2;
    --purple2:#A855F7;
    --purple3:#C084FC;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Poppins;
    background:var(--bg);
    color:white;
}

/* FUNDO NEON */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,43,226,.25), transparent 30%),
    radial-gradient(circle at 80% 40%, rgba(168,85,247,.2), transparent 35%),
    radial-gradient(circle at 50% 90%, rgba(192,132,252,.15), transparent 35%);
    z-index:-1;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,.8);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(138,43,226,.3);
    padding:15px 30px;
    z-index:10;
}

.logo{
    font-family:Orbitron;
    color:var(--purple3);
    font-weight:900;
}

/* HERO */
.hero{
    text-align:center;
    padding:130px 20px 40px;
}

.hero h1{
    font-family:Orbitron;
    font-size:3rem;
    text-shadow:0 0 20px var(--purple);
}

.hero p{color:#aaa;margin-top:10px;}

input,select{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(138,43,226,.4);
    background:#111;
    color:white;
    outline:none;
}

/* GRID */
.section{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.title{
    text-align:center;
    font-family:Orbitron;
    color:var(--purple3);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(138,43,226,.3);
    border-radius:15px;
    padding:15px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(138,43,226,.5);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{margin-top:10px;color:white;}
.card p{color:#aaa;font-size:13px;}

.card a{
    display:inline-block;
    margin-top:10px;
    color:var(--purple3);
    text-decoration:none;
}

/* TIER LIST */
.tier div{
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    font-weight:bold;
}

.splus{background:#ff0066;}
.s{background:#ff4d00;}
.a{background:#b84dff;}
.b{background:#6d28d9;}
.c{background:#333;}

/* CODES */
.code{
    display:flex;
    justify-content:space-between;
    background:#111;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    background:var(--purple);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    color:#777;
}
</style>
</head>

<body>

<header>
    <div class="logo">ANIME VANGUARDS WIKI</div>
</header>

<section class="hero">
    <h1>Anime Vanguards Wiki</h1>
    <p>Pesquisa completa de unidades, traits e evoluções</p>

    <input id="search" placeholder="Pesquisar unidade...">

    <select id="filter">
        <option value="all">Todas raridades</option>
        <option value="Mythic">Mythic</option>
        <option value="Legendary">Legendary</option>
        <option value="Epic">Epic</option>
        <option value="Rare">Rare</option>
    </select>
</section>

<section class="section">
    <h2 class="title">Unidades</h2>
    <div id="grid" class="grid"></div>
</section>

<section class="section">
    <h2 class="title">Tier List</h2>
    <div class="tier">
        <div class="splus">S+ Tier</div>
        <div class="s">S Tier</div>
        <div class="a">A Tier</div>
        <div class="b">B Tier</div>
        <div class="c">C Tier</div>
    </div>
</section>

<section class="section">
    <h2 class="title">Códigos</h2>

    <div class="code">
        <span>UPDATE13</span>
        <button onclick="copy('UPDATE13')">Copiar</button>
    </div>

    <div class="code">
        <span>VANGUARDSFREE</span>
        <button onclick="copy('VANGUARDSFREE')">Copiar</button>
    </div>
</section>

<footer>
    © 2026 Anime Vanguards Wiki
</footer>

<script>
/* ===== DADOS (JSON INTERNO OU EXTERNO) ===== */
let units = [
    {
        name:"Gojo",
        rarity:"Mythic",
        type:"Ground",
        image:"https://via.placeholder.com/300x180",
        wiki:"https://animevanguards.fandom.com"
    },
    {
        name:"Jin Woo",
        rarity:"Mythic",
        type:"Air",
        image:"https://via.placeholder.com/300x180",
        wiki:"https://animevanguards.fandom.com"
    },
    {
        name:"Alucard",
        rarity:"Legendary",
        type:"Ground",
        image:"https://via.placeholder.com/300x180",
        wiki:"https://animevanguards.fandom.com"
    }
];

let filtered = [...units];

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

/* RENDER */
function render(list){
    grid.innerHTML = "";

    list.forEach(u => {
        grid.innerHTML += `
        <div class="card">
            <img src="${u.image}">
            <h3>${u.name}</h3>
            <p>${u.rarity} • ${u.type}</p>
            <a href="${u.wiki}" target="_blank">Ver Wiki</a>
        </div>
        `;
    });
}

render(units);

/* SEARCH + FILTER */
search.addEventListener("input", apply);
filter.addEventListener("change", apply);

function apply(){
    const text = search.value.toLowerCase();
    const rarity = filter.value;

    filtered = units.filter(u =>
        u.name.toLowerCase().includes(text) &&
        (rarity === "all" || u.rarity === rarity)
    );

    render(filtered);
}

/* COPY */
function copy(text){
    navigator.clipboard.writeText(text);
    alert("Copiado: " + text);
}
</script>

</body>
</html>
