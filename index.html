<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Vanguards Wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --bg2:#0d0d0d;
    --purple:#8A2BE2;
    --purple2:#A855F7;
    --purple3:#C084FC;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:white;
    overflow-x:hidden;
}

/* fundo neon */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,43,226,.25), transparent 30%),
    radial-gradient(circle at 80% 40%, rgba(168,85,247,.2), transparent 35%),
    radial-gradient(circle at 50% 90%, rgba(192,132,252,.15), transparent 35%);
    z-index:-1;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    background:rgba(5,5,5,.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(138,43,226,.4);
    z-index:999;
}

.nav{
    max-width:1400px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 30px;
}

.logo{
    font-family:'Orbitron';
    color:var(--purple3);
    font-weight:900;
    text-shadow:0 0 15px var(--purple);
}

/* HERO */
.hero{
    padding:140px 20px 60px;
    text-align:center;
}

.hero h1{
    font-family:'Orbitron';
    font-size:3.5rem;
    text-shadow:0 0 20px var(--purple);
}

.hero p{
    color:#bbb;
    margin-top:10px;
}

.search{
    margin-top:25px;
}

.search input{
    width:350px;
    max-width:90%;
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(138,43,226,.4);
    background:#111;
    color:white;
    outline:none;
}

/* FILTRO */
.filter{
    margin-top:15px;
}

select{
    padding:10px;
    border-radius:10px;
    background:#111;
    color:white;
    border:1px solid rgba(138,43,226,.4);
}

/* GRID */
.section{
    max-width:1400px;
    margin:auto;
    padding:40px 20px;
}

.title{
    text-align:center;
    font-family:'Orbitron';
    color:var(--purple3);
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(138,43,226,.3);
    border-radius:15px;
    padding:15px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px rgba(138,43,226,.5);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

.rarity{
    margin-top:8px;
    font-size:12px;
    color:#aaa;
}

/* TIER */
.tier{
    display:grid;
    gap:10px;
}

.tier div{
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

.splus{background:#ff0066;}
.s{background:#ff4d00;}
.a{background:#b84dff;}
.b{background:#6d28d9;}
.c{background:#333;}

/* CÓDIGOS */
.code{
    display:flex;
    justify-content:space-between;
    background:#111;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

button{
    background:var(--purple);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    color:#777;
    border-top:1px solid rgba(138,43,226,.2);
}
</style>
</head>

<body>

<header>
    <div class="nav">
        <div class="logo">ANIME VANGUARDS WIKI</div>
    </div>
</header>

<section class="hero">
    <h1>Anime Vanguards Wiki</h1>
    <p>Unidades, traits, tier list e códigos</p>

    <div class="search">
        <input id="search" placeholder="Pesquisar unidade...">
    </div>

    <div class="filter">
        <select id="filter">
            <option value="all">Todas raridades</option>
            <option value="Mythic">Mythic</option>
            <option value="Legendary">Legendary</option>
            <option value="Epic">Epic</option>
            <option value="Rare">Rare</option>
        </select>
    </div>
</section>

<section class="section">
    <h2 class="title">Unidades</h2>
    <div id="grid" class="grid"></div>
</section>

<section class="section">
    <h2 class="title">Tier List</h2>
    <div class="tier">
        <div class="splus">S+</div>
        <div class="s">S</div>
        <div class="a">A</div>
        <div class="b">B</div>
        <div class="c">C</div>
    </div>
</section>

<section class="section">
    <h2 class="title">Códigos</h2>

    <div class="code">
        <span>UPDATE13</span>
        <button onclick="copy('UPDATE13')">Copiar</button>
    </div>

    <div class="code">
        <span>VANGUARDS2026</span>
        <button onclick="copy('VANGUARDS2026')">Copiar</button>
    </div>
</section>

<footer>
    © Anime Vanguards Wiki Fan Project
</footer>

<script>
/* ===== DADOS DAS UNIDADES ===== */
const units = [
    {name:"Gojo", rarity:"Mythic", img:"https://via.placeholder.com/300x180"},
    {name:"Jin Woo", rarity:"Mythic", img:"https://via.placeholder.com/300x180"},
    {name:"Alucard", rarity:"Legendary", img:"https://via.placeholder.com/300x180"},
    {name:"Naruto", rarity:"Epic", img:"https://via.placeholder.com/300x180"},
    {name:"Luffy", rarity:"Epic", img:"https://via.placeholder.com/300x180"}
];

let filtered = [...units];

const grid = document.getElementById("grid");
const search = document.getElementById("search");
const filter = document.getElementById("filter");

/* RENDER */
function render(list){
    grid.innerHTML = "";

    list.forEach(u => {
        grid.innerHTML += `
        <div class="card">
            <img src="${u.img}">
            <h3>${u.name}</h3>
            <div class="rarity">${u.rarity}</div>
        </div>
        `;
    });
}

render(units);

/* SEARCH */
search.addEventListener("input", e => {
    applyFilters();
});

/* FILTER */
filter.addEventListener("change", () => {
    applyFilters();
});

/* COMBINA PESQUISA + FILTRO */
function applyFilters(){
    const text = search.value.toLowerCase();
    const rarity = filter.value;

    filtered = units.filter(u => {
        const matchText = u.name.toLowerCase().includes(text);
        const matchRarity = rarity === "all" || u.rarity === rarity;
        return matchText && matchRarity;
    });

    render(filtered);
}

/* COPY CODE */
function copy(text){
    navigator.clipboard.writeText(text);
    alert("Copiado: " + text);
}
</script>

</body>
</html>
